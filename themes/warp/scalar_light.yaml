# Scalar Light -- Warp terminal theme
#
# Place in ~/.warp/themes/ and select from Warp Settings > Appearance > Themes.

accent: "#007ac2"
background: "#e6e6e6"
foreground: "#1f1f1f"
details: lighter
terminal_colors:
  normal:
    black: "#1f1f1f"
    red: "#ef0006"
    green: "#078657"
    yellow: "#866300"
    blue: "#007ac2"
    magenta: "#5203d1"
    cyan: "#00758a"
    white: "#7a7a7a"
  bright:
    black: "#686868"
    red: "#cc4700"
    green: "#229267"
    yellow: "#9a7410"
    blue: "#1f89cc"
    magenta: "#6420d8"
    cyan: "#0f8698"
    white: "#767676"
