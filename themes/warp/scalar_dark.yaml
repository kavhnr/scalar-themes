# Scalar Dark -- Warp terminal theme
#
# Place in ~/.warp/themes/ and select from Warp Settings > Appearance > Themes.

accent: "#4eb3ec"
background: "#2f2e2c"
foreground: "#d8d3ca"
details: darker
terminal_colors:
  normal:
    black: "#56514b"
    red: "#e53b39"
    green: "#00b648"
    yellow: "#ffc90d"
    blue: "#4eb3ec"
    magenta: "#b191f9"
    cyan: "#42bfd3"
    white: "#b8b2a8"
  bright:
    black: "#9b958b"
    red: "#ff8d4d"
    green: "#26c466"
    yellow: "#ffd33a"
    blue: "#6bc2f2"
    magenta: "#c3a6fb"
    cyan: "#66cedf"
    white: "#d8d3ca"
